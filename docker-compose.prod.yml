services:
  backend:
    image: ${IMAGE_BASE:-ghcr.io/marcjulianschwarz/wframe}-backend:latest
    pull_policy: always # always fetch the newest :latest on `up`
    container_name: wframe-backend
    restart: always
    env_file: .env
    expose:
      - "8000"
    networks:
      - wframe-internal
      - secrets
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${IMAGE_BASE:-ghcr.io/marcjulianschwarz/wframe}-frontend:latest
    pull_policy: always
    container_name: wframe-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine
    container_name: wframe-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    networks:
      - wframe-internal
    volumes:
      - wframe_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  # Self-hosted Infisical lives here; created by the infisical compose project.
  secrets:
    external: true
  # Private network for backend<->postgres, isolated from the proxy.
  wframe-internal:

volumes:
  wframe_pg:
