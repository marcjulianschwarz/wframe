services:
  backend:
    build: ./services/backend
    restart: always
    env_file: .env
    ports:
      - "9021:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./services/frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    ports:
      - "9022:80"
    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - wframe_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wframe_pg:
