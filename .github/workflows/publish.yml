name: Publish Docker Images

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR

    strategy:
      matrix:
        include:
          - name: backend
            context: ./services/backend
          - name: frontend
            context: ./services/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          # VITE_API_URL is baked into the frontend bundle at build time. Ignored by backend.
          build-args: |
            VITE_API_URL=https://api.wframe.de
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
