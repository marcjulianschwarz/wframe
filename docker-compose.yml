services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wframe
      POSTGRES_USER: wframe
      POSTGRES_PASSWORD: wframe
    ports:
      - "5433:5432"
    volumes:
      - wframe_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wframe -d wframe"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wframe_pg:
