<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- wframe favicon: an e-paper panel (rounded frame) with the wframe "w" -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7468ff"/>
      <stop offset="1" stop-color="#6559ed"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>

  <!-- inner e-paper "screen" frame -->
  <rect x="12" y="12" width="40" height="40" rx="6"
        fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="2"/>

  <!-- the wframe "w" rendered as strokes, like ink on the panel -->
  <path d="M18 24 L25 41 L32 30 L39 41 L46 24"
        fill="none" stroke="#ffffff" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
